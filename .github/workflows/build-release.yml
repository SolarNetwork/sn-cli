name: Release Build

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: s10k on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ 'ubuntu-24.04', 'ubuntu-24.04-arm', 'macos-15', 'windows-2025'  ]
        
    steps:
      - uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: true

      - name: Build
        run: ./gradlew assemble distTar
      
      - name: Release jar
        uses: softprops/action-gh-release@v3
        if: matrix.os  == 'ubuntu-24.04'
        with:
          draft: true
          prerelease: true
          token: ${{ secrets.RELEASE_TOKEN }}
          files: 'app/build/libs/s10k-${{ github.ref_name }}.jar'        
      
      - name: Release distribution
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: true
          token: ${{ secrets.RELEASE_TOKEN }}
          files: 'app/build/distributions/*.tar.gz'
